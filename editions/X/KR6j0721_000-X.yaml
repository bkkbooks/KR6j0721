body:
  text: 指味疏略科提綱將釋此序總分為二初釋題二初合釋二離釋二初釋別題二初釋大佛頂二釋首楞嚴二釋通題二釋文四初序一經大旨四初提全文綱要二顯一經獨勝三初明佛興所以二明法化所以三明獨勝所以三彰名義因果四明理行性修二初明理行二明性修二序十軸文義六初序機感二序教興三初巧示緣起二點示常心三懸示定名三顯圓理四初細勘徵心辨見為破妄顯真二初序七處徵心二序十番辨見二初總標心見互顯二別列十番妙辨二廣列四科七大明全妄即真二初標列二正示三答執相難性融性相不二二初結起二正融四引迷真逐妄顯妄本無因四示圓行二初總標二別釋三初明二義決定為修行之要領二定請根優劣為正修之方便三示雙修顯密為覺路之資糧五明圓證三初總明位次淺深懸示未證而論證二別示行門邪正預談既修宜真修二初示邪行岐途二示正修差別三結歸圓滿菩提尅論到家無新得六結圓名二初結理行證二皆究竟二結教行理三悉楞嚴三判正宗科節二初正科判二略顯義二初示當分二示跨節四示藉教明心指味疏略科終大佛頂經序指味疏緣起詳夫此經由來無序先哲以會解之序移置經端者喜其文義周足經旨炳然故也夫以疏序為經序可謂美善雙盡矣第序與經時甚懸殊是以箋釋者寡今夏予受滬上龍華之請將欲敷演斯經法眾不下二千餘指然皆膚學居多尚不諳字義句節安求理趣時同學有請以此序裂句分章略事訓釋以便初機拾級臨高之助既不獲辭乃仿法華弘傳意為之編科列目命筆疏通原始要終不日成帙遂定名曰指味疏意謂閱全經猶䬸大鍋之膳研是疏如甞一指之味也眾皆合十稱善予曰斯稿雖就殊為草率自知下里巴歌未敢聞諸郢客惟望諸君弗憚繁瑣必玩索而後得之未始非供養海中之一滴耳或謂初習教乘者流既經義全疏罔知底蘊疏亦奚裨予曰子是何言歟豈不聞慧學者務期宿見博問者貴在先知茲稿正為初心入手時易得全經綱要使關節一清無致問橋之歎亦安患為太早計耶唯冀潛修上士同志高人先請熟讀經文然後安心觀法覽斯疏而通會忘言象以冥符願一旦常光顯現使根塵識消則佛法身心尚為餘事況此妄識依通豈非剩語者哉時光緒癸巳夏五端陽日台宗晚學卓三比丘諦閑擱筆故書
