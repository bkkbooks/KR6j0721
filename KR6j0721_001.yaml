body:
  text: 古吳師子林天如禪師唯則撰序黃巖台宗裔孫比丘諦間述疏將釋此序大科分二初釋題二釋文初又二初合釋二離釋今初大佛頂首楞嚴經敘此序以單法立題只一法字義含十雙謂教義性修事理境智止觀正助行位因果體用六即也初言教義一雙者教謂能詮即經敘二字義謂所詮即大等六字此一是通義九雙是別義二就所詮義中言性修一雙者性即大佛頂修即首楞嚴也意欲令人悟大佛頂法即心自性始知從性起修故三就修中言事理一雙者謂梵語首楞嚴華言一切事畢竟堅固今言事即一切事謂陰入處界也理即畢竟堅固謂妙覺明體也既知從性起修必知全修在性故四就事理中言境智一雙者謂上之事理皆可為境依境修觀觀名為智以境發智以智照境故五就境智中言止觀一雙者謂境是所觀智是能觀所觀即一境三諦能觀即一心三觀亦即一心三止亦名圓頓止觀以止觀不二故六就止觀中言正助一雙者圓頓止觀是正行即二十五門是如其理障惑強止觀功微務須加持神呪故有三七建壇經云更以異方便助顯第一義正助並行收功彌速故七就正助中言行位一雙者行有進趣之功能趣即三漸次所趣即五十五位行必入位故八就行位中言因果一雙者行位未極總屬因心圓滿菩提方稱果覺因必尅果故九就因果中言體用一雙者自行因果是體化他因果為用體必發用故十就體用後言六即一雙者以自他具有六即義故謂六分因果之事殊即顯凡聖之理等明六義不生上慢明即義不生退屈約性約理則知六而常即言修言事則知即而常六故今言大佛頂者非因非果之妙性也首楞嚴者通因徹果之妙修也是故出世行人先須悟大佛頂理了知五陰六入十二處十八界本如來藏妙真如性然後於陰入處界等諸法隨拈一法無非即空即假即中圓三諦理皆得為所觀境依境修觀能觀之智即一心三觀亦名一心三止照真諦理即空觀照俗諦理即假觀照中諦理即中觀空觀即體真止假觀即方便隨緣止中觀即息二邊分別止又三止即空觀三觀即假觀止觀不二即中觀在因曰止觀在果曰定慧止觀功成即名首楞嚴王妙三摩提以此為因即名如來密因修此一行具足菩薩萬行大佛頂是所莊嚴首楞嚴為能莊嚴能所不二為妙莊嚴故曰十方如來一門超出妙莊嚴路具詮諸義即名經懸述綱要名為敘也合釋竟二離釋二初釋別題二釋通題初又二初釋大佛頂二釋首楞嚴今初大佛頂三字事釋理釋古今疏解不啻盈棟茲不暇録今直就一切衆生現前一念心性而發明也以吾人現前一念之心本非肉團亦非緣影實無方隅亦無分劑是故不在內外中間無有前後并無時劫是故不屬過現未來然此心非一切法一切法不能收攝而此心即一切法一切法莫可逃遁離即離非是即非即言語道斷心行處滅不得已強名曰大非對小言大以對小言大則大有分量非真大故亦非先小後大以先小後大則大有始終非本大故要之十方無盡三際莫窮故言曰大大有三義一離過絶非義即體大二豎窮橫遍義即相大三具足恆沙義即用大以吾人現前一念之心靈明不昧了了常知故名曰佛佛者覺也覺有三義一圓明獨照義即自覺二隨緣照了義即他覺三徹照心源義即滿覺以吾人現前一念之心量絶邊涯體尊無極故名為頂頂有三義一最尊義一切諸法莫可比擬故二不可見義四過咸離百非俱絶故三放光現化義隨緣普應不染諸塵故一字具三三三具九若細分之義應無量無量妙義唯是一心故言一心為大佛頂乃衆生之性德為當經之正體仍遍為一切諸大乘經之體以如來所說一代時教皆是稱性之談故曰佛說上下法唯是一心作作是說者名為正說若他說者即波旬說復次若能悟斯大佛頂義便能遍達全經妙義茲當不避繁文撮其樞要略為點示經初阿難請妙奢摩它三摩禪那最初方便悟大義是禪那之方便悟佛義是奢摩之方便悟頂義是三摩之方便又體大是禪那之方便相大是奢摩之方便用大是三摩之方便又奢摩是自覺三摩是他覺禪那是滿覺又禪那是最尊奢摩是不可見三摩是放光現化又三即一是奢摩一即三是三摩非一非三而三而一是禪那又即常住真心性淨明體性明是奢摩即相大性淨是三摩即用大常住是禪那即體大佛頂各三乃至三一一三非一非三而三而一如上說七處徵心文中正破七處咸非即相大旁顯七處皆是即用大有三摩提名首楞嚴王即體大三一一三乃至佛頂各三如上說十番辨見文中番番皆有斯義今略其二三主與空俱是相大客與塵俱是用大皆無二性即體大指皆是物無是見者即相大微細發明無非見者即用大元是菩提妙淨明體云何於中有是非是即體大見與見緣并所想相如虗空華本無所有即相大本是妙明無上菩提淨圓真心妄為色空及與聞見即用大此見及緣元是菩提妙淨明體即體大三一一三乃至佛頂各三如上說四科文中性真常中求於去來迷悟生死了無所得即相大幻妄稱相即用大其性真為妙覺明體即體大七大文中周遍法界即相大性色真空性空真色循業發現即用大清淨本然即體大大衆圓悟文中心遍十方空如葉物即相大父母生身如塵如漚即用大物即妙心心精含裹即體大三如來藏一切俱非即相大一切俱即即用大離即離非是即非即即體大二十五門所觀之境一一皆具圓通常三真實圓真實即相大通真實即用大常真實即體大五會神呪名摩訶悉怛多鉢怛囉此云大白傘蓋白即相大傘蓋即用大摩訶即體大六十聖位第三漸次文中云一切如來密圓淨妙皆現其中圓即相大淨即用大密即體大非一非三而三而一三一俱不可思議曰妙三一一三乃至佛頂各三皆如上說略點全文大旨竟二釋首楞嚴首楞嚴三字直指一切行人全性起修之性定乃大定之略名也具足應云大佛頂首楞嚴王首楞嚴云一切事畢竟堅固今謂事言一切者即總收十法界之根身器界所謂五陰六入十二處十八界七大也言畢竟堅固者畢竟即徹底義堅固即常住義所謂徹法底源無動無壞也意謂行者既悟大佛頂性便能了知一性一切性一切性一性是故陰處界等一切諸法一一無非大佛頂性故曰本如來藏妙真如性也經云色心諸緣及心所使諸所緣法唯心所現汝身汝心外及山河虗空大地咸是妙用真精妙心中所現物耳了知全性起修自然全修在性非離性外別有修也以性無外故復次只此修法仍當會取經中修行妙旨言依一切事畢竟空修成奢摩它真諦三昧依畢竟假修成三摩鉢提俗諦三昧依畢竟中修成禪那中諦三昧又三即一是真諦三昧一即三是俗諦三昧非一非三而三而一是中諦三昧三一圓融故名為妙只一三昧統收一切三昧故曰首楞嚴王二十五聖所修三昧即此三一圓融之三昧也良以法門平等原無優劣且文殊獨選耳門為最勝者乃就當時一類之機欲其就路還家耳非有私於觀音也大抵悟心大士既悟大佛頂性必能了達一切諸法平等之性是故隨拈一法皆得為所觀境皆具圓通常三真實義非獨觀音為然也慧學之流不可不知是故余嘗謂靈峯旭祖科前三卷半經為顯如來藏妙真如性圓三諦理以酬當機最初方便之請為千古之獨唱苟非升天台之堂入聖祖之室者安有若斯超邁之見佛頂文句詳明其旨智者細心味之自見其妙前來一切三義皆是不思議境行者依之修觀所觀之境隨拈一法皆具三諦能觀之心隨舉一念皆具三觀亦即三止諦觀不二止觀不二故稱妙也一切衆生是理即大佛頂首楞嚴聞名生解是名字即大佛頂首楞嚴圓起妙修是觀行即大佛頂首楞嚴六根清淨是相似即大佛頂首楞嚴無明豁破是分證即大佛頂首楞嚴五住究盡是究竟即大佛頂首楞嚴也釋別題竟二釋通題上六字是別名乃一經所詮之法義經敘二字是通名經字別指當部能詮之文字敘字單指此篇之別目也言經者徑也謂此經乃超凡入聖返本還元之徑路也敘者懸述也謂懸述經中綱要使後學開卷瞭然如視諸掌也又說此大義述此宏綱名為經敘又大佛頂即理經首楞嚴即行經經敘即教經復次大佛頂序體首楞嚴序宗從性起修修有伏斷序用體宗用次第不紊序教立此為題序名三經具足五玄備周言雖簡意盡詳矣釋題竟二釋文四初序一經大旨二序十軸文義三判正宗科節四示藉教明心初又四初提全文綱要二顯一經獨勝三彰名義因果四明理行性修今初首楞嚴經者諸佛之慧命衆生之達道教網之宏綱禪門之要關也此節總提全文之綱要也初句標徵首楞嚴三字如題釋者是徵起之辭又即物而襯墊之詞將釋其中旨趣先用者字墊之引出文中所以也次四句釋義首句諸者衆也有時處二義舉時則攝過去現在未來言處則該四方四隅上下佛者覺也覺有三義一自覺謂覺了自性真常悟知煩惱虗妄二覺他謂自既覺悟還須運無緣慈普度未悟三覺滿謂窮源極底福智圓明三覺皆圓萬德具足故稱為佛此是極果之稱若云當人自己謂一念不迷曰覺覺者即佛也若一覺之後不復更迷如日出無暗即與佛同儔之者語助之辭句文不足添之字助之慧者照了之義謂自性靈通觸物即了命有二一四聖唯智為命二六凡連持色心為命今言慧命者唯指聖人以智慧為命也意謂此經是十方三世諸佛之慧命乃舉諸而顯一也當知心佛衆生三無差別舉諸佛之慧命即顯我本師之慧命顯本師之慧命即顯吾人之慧命亦即顯一切衆生之慧命以吾人與衆生即未來之諸佛也須知諸佛之慧命無他即吾人現前一念之心故曰是心作佛是心是佛若離心言佛即同魔說經中七處徵心即是正破妄執密顯真心十番辨見正是徹底談心陰入處界就事顯心地水火風即相明心大衆圓悟悟此妙心便云了然自知獲本妙心是故當機陳謝直曰不歷僧祇獲法身法身即慧命也明三如來藏竟亦云疑惑消除心悟實相實相即慧命之異稱也豈非以現前一念之心為諸佛慧命之明證乎其間明決定審根本定六根陳圓通攝心軌則安立道場乃至懸示六十聖位是為大開修證之門修即修此慧命證即證此慧命非離此外別有修證也而後廣示七趣詳辨五魔無非指示現前一念迷悟之差別耳迷即迷此慧命悟亦悟此慧命要而言之請此說此解此修此證此迷悟差別皆此也故曰是經者諸佛之慧命也二句言衆生者十界中唯除佛可稱非衆生其餘九界皆是也世間六凡出世三聖無明未盡皆有生在生必五衆和合而成名衆生也達道二字各有二義若謂達是通達道是道理即指第一大科悟圓理義經云為令衆生修大乘者通達實相又云疑惑消除心悟實相之類如謂達是了達道是道路即指第二第三修證二大科文經云明了其家所歸道路又云五十五位真菩提路後文七趣升沈是未達道之差別五魔擾亂是行道路之差別故曰是經者衆生之達道也三句教指佛說一大藏教網是譬喻言網目之多喻佛教門之多也梵網經云時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔佛教門亦復如是言教門多者如來說法貴在逗機機既萬殊法亦千變概而為語有四種教良以衆生流轉生死止因二種無明一迷中無明二迷真無明迷真故有分段生死迷中故有變易生死而二迷復各有輕重不同故界內外人又各有利鈍根異迷真重者為界內鈍根非析空觀莫生其解故有藏教法起輕者為界內利根非體空觀莫逗其宜故有通教法起迷中重者為界外鈍根非次第三觀莫治其惑故有別教法起輕者為界外利根非一心三觀莫開其悟故有圓教法起就此四教各有四門入道謂有門空門亦有亦空門非有非空門四教共一十六門又各具四種悉檀謂衆生聞一一門或得歡喜益是世界悉檀得生善益是為人悉檀得滅惡益是對治悉檀得入理益是第一義悉檀又有信行人法行人自行化他等法門無量故如網目之多也宏大也綱是網口之大繩謂綱領也網喻大藏諸經綱喻楞嚴一經意謂大藏中諸經無量若謂開妙理之深藏示修證之大途指迷悟之差別明禪定之境相明顯宣示當遜斯經故曰是經者教網之宏綱也末句梵語禪那此云靜慮又云思惟修通途言之一切行門皆禪也所謂真諦三昧俗諦三昧中諦三昧次第三昧一心三昧行為入理之門故曰門也言禪門要關者禪門二字通指宗下參玄行者要關二字的指斯經以經中第一大科顯圓理文正宗門中法身向上一著第二第三二科開修證門正悟後履踐之實事第五科廣示七趣第六科詳辨五魔真宗門中之明鏡所謂懸寶鏡於高堂胡漢俱現是也經云不作聖心名善境界若作聖解即受羣邪真照膽語明指是經凡參宗人尤為緊要故曰禪門之要關也要者的的不可少之謂關者阻節要會之處也上來四句釋義句句通論全文要旨若分而論之亦無不可今略為點示首句是第一大科之要旨謂顯圓理也此理乃當人之妙心即諸佛之慧命也二句是第二大科之要旨謂示觀門也觀為能達理為所達自觀行至分證皆名為路故曰衆生達道三句是三四五科之要旨大意謂悟此一心則真如熏於無明而成淨用為單復十二聖位迷此一心則無明熏於真如而成染用為顛倒十二類生可見現前一念迷悟實教網之宏綱也末句是第六大科之要旨謂辨五魔也斯文正如王度寶鏡真禪門之要關也提綱要竟二顯一經獨勝三初明佛興所以二明法化所以三明獨勝所以今初世尊成道以來五時設化無非為一大事因緣此節明佛一代時教發明性修行證獨斯經為最勝也初句標佛興世尊即指本師因修萬行果彰萬德三覺圓明二嚴克備為世出世間九界衆生之所尊重也圓滿具足曰成至妙虗通曰道謂本性圓明道隆德備即成就無上正等正覺也言我本師示迹於迦維衛國淨梵王宮為釋達太子捨金輪位𧼯城出家至雪山六年苦行後於摩伽提國菩提樹下成等正覺故曰成道以來者謂始自覺場成佛終至雙樹泥洹中間所歷之時也二句明說法時者時分有長短不同長曰劫波短曰剎那言五時者謂世尊五十年所說之法大士結集成為二藏一大乘教曰菩薩藏二小乘教曰聲聞藏自法水東流天台聖祖智者大師判二藏為五時謂一華嚴時二鹿苑時三方等時四般若時五法華涅槃時言設化者設是施設乃建立之義化是化導乃誘引之義意謂如來一代時教祖師判為五時總為建立教化誘引衆生使人從言得旨借教明心此外更無餘蘊矣三句正明所以言無非者出世度生非為別事也故曰為一大事因緣一大事者一指衆生之一心大直指心之當體也大義有三謂體相用如題釋事是事業指佛出世之事業也衆生機感為因諸佛應化為緣為者特特之謂也意謂我本師世尊自己徹證心性受大法樂以同體大悲緣念衆生之苦迷失本心枉受輪轉故為特特出世普令衆生覺悟自心同受法樂而已所謂唯此一事更無餘事二明法化所以求其總攝化機直指心體發宣真勝義性簡定真實圓通求參尋之意言序主參尋如來法化之所以也其有所指的之辭總統也攝收也化機二字指衆生受化之機宜也直謂正直指謂指示心體者即本經謂常住真心性淨明體也發是開啓之辭宣是揚說之辭從來不假曰真殊妙超特曰勝言之所詮曰義理之異稱曰性言真勝義性者如來說法常依二諦說世間法為世俗諦說出世法為勝義諦今所說者異乎常說是勝義中之勝義是故曰真曰性即第一義諦中道實相也簡是選擇之謂定是不易之謂圓是具足不缺之義通是融流不壅之義無妄曰真無虗曰實言真實圓通者意指耳根法門圓照三昧也三明獨勝所以使人轉物同如來彈指超無學者無尚楞嚴矣使令也人靈也以人為百物之最靈也轉是回旋之義物者浮塵境像也同無異也如來者諸佛之通號謂後佛出世如先佛之再來乃倣同先德號也此句意謂衆生所以不成正覺同如來者皆因不了萬法唯心以凡外認物為己權小迷己為物總為物轉不能轉物良以無始迷本如來藏心轉變而為藏識法爾幻起見相二分為色為心以凡外不知色心乃真心之幻影執為實有認以為己權小不知諸法原由藏識變現妄執心外實有即是迷己為物所以逐境遷移動被所礙全無自由之分矣是知物本是心迷之反礙於心譬如冰本是水結之反礙於水皆自迷而自礙耳是故為物所轉即名衆生經云自心取自心非幻成幻法是也今言轉物者乃轉見相二物也以此二物如蝸牛二角出則成雙入則一體今但不隨境界分別則見分泯泯見分則離一切身心執取離執取則相分自轉所謂湛入合湛歸識邊際故得識精圓明轉而成智便是如來藏心故曰若能轉物則同如來也經云不取無非幻幻法云何立是也彈指者手指與指自相彈擊作聲言其時之速也超者頓證之義學者切磋琢磨之謂即用功也言無學者即無功用道有大小乘之別大乘唯佛獨稱小乘指阿羅漢謂研真斷惑名有學真窮惑盡為無學今指小乘言彈指超者意顯斯經不歷僧祇獲法身狂心若歇歇即菩提可以頓超小果言得道之易猶彈指之頃也無尚句正顯獨勝所以謂序主參尋如來所說五時法化若言總攝化機直指心體乃至使人彈指頓超立地成佛莫過高尚於斯經矣三彰名義因果釋其名則一切事究竟堅固即所謂徹法底源無動無壞而如來密因菩薩萬行靡不資始乎此而歸極乎此耳初句彰名釋是解釋其名者即指首楞嚴翻為一切事究竟堅固如題釋二句釋義即吃緊之意所謂猶云所說也原其說而進解之辭徹洞然了悟之意法指諸法謂自性軌持之義底源二字皆指常住真心謂心為諸之依止故名為底萬法皆由心現故名為源無動無壞即常住不變之意今言徹者謂洞明法法唯心法住法位世間相常也法之一字即釋一切事義無動無壞即釋究竟堅固義意謂斯經名首楞嚴者即古德所謂徹法底源無動無壞者是也而如來下正明通因徹果無非盡此八字而已而者語助之詞亦小轉之詞文非而字則血脈不通如來指果人諸菩薩指因人密因者因是三因佛性此性即吾人現前一念之心上言無動壞者乃成佛之正因佛性前言悟萬法之唯心悟字乃成佛之了因佛性乃至舉手低頭種種善行乃成佛之緣因佛性如來極果聖人究竟成我之三因而已衆生迷而不知故名曰密萬行者即成佛之緣因也萬是此方總數表其最多行是修德都名不出二種謂福行慧行言菩薩自利利他之行歷位造修行應無量如十信全根力而植佛種十住生佛家而成佛子十行廣六度而行佛事十向回佛事而向佛心四加泯佛心而滅數量十地契真如而覆涅槃等覺齊佛際而破生相一具一切主伴重重緣起無礙如帝網珠照映無盡今言萬者不過顯其數多耳靡不資始乎此者靡無也資稟也始初也此字即指現前一念常住真心意謂菩薩最初發心修因無不資稟乎此心而歸極乎此者謂乃至究竟圓成佛果而還歸極手此心耳四明理行性修二初明理行二明性修今初考其所詮則談圓理以明真性開圓行以示真修考研究參詳之義其指物之辭即指當經言能顯理曰詮文字為能詮妙理為所詮則接語緊要之辭談宣揚也圓是圓融中道理是平等理性明是明悟真性二字直指吾人本具妙心此心從來不妄曰真古今不改曰性此句意謂序主參考前三卷之經文則純談圓融中道之理故曰所詮普令一切衆生各各悟明自心本具為造修之本也開即開示行即造修依圓理而起行曰圓行從真性而起修曰真修真性是圓理之異名真修是圓行之異名示即指示謂參考經中自四卷至八卷所詮顯者皆為開示依圓理以起圓行俾行者從真性以起真修也二明性修其性也體用雙彰其修也果因一契原始要終了義之說也其性即指上之真性其修即指上之真修此二也字用在句文之中非歇語之辭乃落而復起之意體是不變之理用是隨緣之事言雙彰者彰顯也意謂其所謂性者此非偏真之理性又非但中之佛性而不具諸法此性乃是圓融中道之理性一具一切也是故前三卷經皆就事顯理即相明性故曰體用雙彰也果因一契者果是果覺因是因心一契符合也意謂其所謂修者此非凡小以生滅心修又非權乘離二邊修此修乃是先悟圓理後起圓修一修一切修因該果徹名一契也末句結顯原始者究本意要終者會末意了義者義指自心第一義諦了無隱覆也意謂原究經中始終要旨真乃大乘圓極之談初則破妄執顯真心會四科融七大明相續之因示圓融之故全彰三藏不離一心以顯性德令人識取自心不向他覓中則明二義定六根陳圓通示真實懸示真菩提路令人得門入室就路還家後則戒業習以空七趣情想修禪定以破五陰樊籠乃至圓滿菩提以畢能事豈非究竟顯了無諸含隱之說也耶二序十軸文義六初序機感二序教興三顯圓理四示圓行五明圓證六結圓名今初良由諸修行人背真向妄不成無上菩提或愛念小乘得少為足或欲漏不除畜聞成過此節總歎七方便人不悟圓理而起造修錯入岐途非法門之咎也良由者的確無疑之歎也諸修行人通指七種方便謂三教菩薩藏通二乘乃至凡夫外道魔王魔眷最初皆修行人也背違也真即一真法界本有妙心向順也妄即六塵緣影生滅想相今於真曰背於妄曰向者明指衆生顛倒行事也無上菩提即佛果之異稱不成者不能成就也意謂衆生發心修行原為成就佛果反謂不成者病在背真向妄顛倒行事之故耳次二句指過或不定之辭孳孳不捨曰愛心心流動曰念乘運載之義小乘即小教二乘得少為足者少謂少分明有限之意足謂滿足此句意謂小教二乘正如羊鹿之車但能自利不能度人本為厭生死苦求出三界既得空無相無作則念念保愛自謂於佛法中勤精進故所得宏多滿足之至也故曰得少為足欲漏不除者漏本有三謂欲漏有漏無明漏除欲漏出欲界除有漏超三界除無明漏離三空畜謂含育過謂過咎言畜聞成過者聞是三慧之初基若聞法修行正是最上行徑謂聞而思思而修修而證有何過咎今言成過者病在畜也謂聞法不肯觀心不務真修實證但隨塵分別流逸奔聲縱使大乘經典實相妙義一生聽聞惟增名言習氣以循塵流轉故曰欲漏不除但計玄言妙語故曰畜聞成過如來說為可憐憫者良可歎也機感竟二序教興三初巧示緣起二點示常心三懸示定名今初故阿難以多聞邪染為緣浚發大教此節明聞而不修畜聞成過為慧學之覆轍耳梵語阿難華言慶喜佛弟子中多聞第一邪染者即尊者次第乞食以遭登伽之難緣是緣助浚深也大教指當經上用故字乃承上起下之辭言承上者以上言畜聞成過所以尊者有示墮之緣意顯歷劫多聞之功尚不免邪染之事況今初學才入講筵便可稱有道人乎今之慧學人應作如是觀言起下者謂斯經大教苟非示墮發起無由所謂惡因緣是好因緣此是尊者深心悲願非大權示現而何故曰浚發大教序分竟下入正宗分也二點示常心而世尊首告之曰一切衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉此節乃一經之關鍵破妄之祕訣也以衆生之真心向被無明封固不能自顯今世尊將欲為衆生破妄顯真先以一言道破也首告者阿難見佛啓請後佛先為垂示之言也衆生有九謂三聖六凡生死有二一變易二分段妄想有三一無明二塵沙三見思輪轉有三一實報輪轉二方便輪轉三同居輪轉常住真心性淨明體即吾人現前一念之心性也此心寂而常照曰性明照而常寂曰性淨即寂即照今古無遷曰常住迷一心則生死無邊悟一心則輪回頓息今言相續正明無始而來不曾悟故故曰不知不知者無智照之功也以不知心之常住故用無明妄想不知心之性淨故用塵沙妄想不知心之性明故用見思妄想此無明妄想不真故有實報土中變易生死輪轉此塵沙妄想不真故有方便土中變易生死輪轉此見思妄想不真故有同居土中分段生死輪轉三懸示定名又曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路斯一經理行之大本也歟此節乃一經之脈絡亦衆生治生死病之奇方也又曰者佛再為垂示之言也梵語三摩提亦云三昧華言正受謂不受諸塵故亦云正定謂非凡夫之不定外道之邪定故王者統攝義謂此一三昧能統攝一切三昧故其名曰大佛頂首楞嚴王也具足萬行者謂修此三昧一行便能圓該諸行也十方如來一門超出者門通也三昧為能通佛果菩提為所通意謂十方如來最初由凡夫地修此一三昧行即從此一門超出二生死海經歷五十五位真菩提路直登妙覺果岸也路曰妙莊嚴者法身為所莊嚴三昧為能莊嚴性修不二為妙莊嚴也斯此也大佛頂一經之理本首楞嚴一經之行本故知即斯一三昧王為一經理行之大本也歟也歟二字是虗歇詠歎之辭教興竟三顯圓理四初細勘徵心辨見為破妄顯真二廣列四科七大明全妄即真三答執相難性融性相不二四引迷真逐妄顯妄本無因初又二初序七處徵心二序十番辨見今初由是破七處攀緣別二種根本首句正序徵心由是二字跟上文引起下文之辭以文義之初前科已入師資悲念為大教之發起故今之七處正由上文跟來故云由是攀攬也緣境也攀是能攀緣是所攀能攀是八識見分所攀是八識相分見相二分皆從八識自證分幻起毫無實體本不可破以衆生不了見相二分如幻當體即是自證分證自證分而妄計見分為心相分為色執為實有是故妄起在內在外乃至一切無著之計故佛破以七處咸非意顯七處無不是也別二種根本者經云一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者意顯一是妄本二是真本別分明辨析之義以衆生不了真妄皆無自性無性之性即是妙真如性今言別者因衆生生死相續皆由不知真心用諸妄想未曾明言真妄無性唯是一心今更申明故言別也二序十番辨見二初總標心見互顯二別列十番妙辨今初因見顯心因心顯見雖心見互顯而正顯在心因託也有形莫隱曰見無法不知曰心一切衆生但知面上之眼能見胸中之心能知豈知能見之眼非一定在面上能知之心不必定在胸中亦二處俱無在無不在也今佛順衆生舊執之情亦不明言知與不知在與不在只以心眼交互發明故云因心顯見因見顯心密意正顯浮塵之眼無見緣影之心非知亦不分明道破令其自悟舊執俱非方信知見原非二物是故此中雖心見互顯而正顯在心也二別列十番妙辨如以盲人矚暗喻見非眼第一辨見性非眼也如此例之辭以借用之意盲人目睛無光見物不明也矚視也暗非明之境也喻曉訓義見非眼者人人從來但知見是面上之眼今忽聞見不是眼誰能信之故佛指以盲人無眼所見之暗與有眼人居暗室中無日月燈所見之暗為同為異阿難答言二黑校量曾無有異佛言設使盲人忽得眼光見種種色與有眼人得燈見色為同為異答言無異佛言盲人得眼見色既名眼見眼人得燈見色應名燈見是故應知燈能顯色見者非燈以是例之眼能顯色見者非眼屈指飛光驗見不動第二辨見性不動也屈曲也指佛手五輪之指也屈指曲握成拳也經云如來於大衆中屈五輪指屈已復開開已復屈也飛光者佛從輪掌中飛一寶光至阿難邊左之右之驗是勘問義以阿難見佛手指開屈飛光左右是故眼忙頭動佛問之曰為我手動為汝見動答曰佛手不住我之見性尚無有靜誰為無住又問汝頭今日因何搖動答曰光來左右故頭自動問曰為汝頭動為復見動答曰我頭自動而我見性尚無有止誰為搖動佛俱印之如是如是以驗見性之不動也印觀河之非變第三辨見性無遷也印楷定之義觀河即波斯匿王三歲見恆河水至年六十有二見恆河水宛然無異悟知由少至老形雖遷變見無遷變變者受滅彼不變者元無生滅以顯見性之無遷也比垂手之無遺第四辨見性無減也比如況之意垂手者經中世尊在大衆中輪手下指問云為正為倒阿難答曰世人以此為倒佛問以何為正答言上指為正佛言原是一手何倒何正不過手尾相換而已以例見性悟則無增迷則無減正如下指雖倒手亦無失上指雖正手亦無得也辨於八還第五辨見性無還也辨分明指示也還歸也如借人之物元非己有終必還歸故主也八還者經云明還日輪乃至第八清明還霽汝能見八種之見性當還於誰是故當知諸可還者自非汝物不可還者是誰物耶以顯見性無還即當人之真性也擇於諸物非舒非縮第六顯見性周遍也擇謂揀擇諸物即上自天宮下至大地舉眼所觀種種諸物必有見性任汝揀擇也舒放也縮收也雙非者如出門見天而見性遍滿虗空非放之令大也進入房中而見性僅止一室非收之令小也或大或小皆屬前塵見性周遍非汝而誰無是無非使悟淨圓真心妄為色空及聞見耳第七顯見性唯真也無是者指皆是物無是見也無非者微細發明無非見也此正勘破是非兩途也使悟下是會通真性一理超出是非兩途也使令也悟領解也此心本來不是諸法曰淨具足諸法曰圓純一無妄曰真色空者六塵中略舉其一聞見者六根中略舉其二意謂上來於根塵諸法之中既不能說是又不能道非到底是箇何物畢竟是誰道得於此疑來疑去忽然打破疑團正眼看來了無一法古德云盡大地是箇自己始信不欺我也從茲了知自心不變之體具有隨緣之用故曰使悟淨圓真心幻有色空之塵境聞見之根性耳妄幻而非真也淨圓真心不變體也色空聞見隨緣用也體真用真故曰唯真既悟妄為尚疑混濫故又破自然因緣第八顯見性非因緣自然也既已而未竟之辭尚猶也混濫事未透徹之意自然因緣乃凡外之性計以外道不達自性隨緣妄計冥諦神我能生萬物或計大自在天為能生謂自然生滅不假因緣也以凡夫不達心體不變或計諸法自生為因他生為緣自他和合為因緣共生也意謂上來無是無非雖悟靈心絶待不變隨緣而於淨圓真心幻為色空聞見尚猶疑懷未徹故曰尚疑混濫此正光未透脫之故耳由是妄生種種計度或計自他共生為因緣故佛以心體不變而破之或計無因自然濫外道故佛以隨緣妙用而破之以其二俱妄情故須破也蓋此不變隨緣隨緣不變是如來說法之綱宗入理之要論也示見見之非見第九顯真精妙覺明性不特超凡外之妄情更能離權小之法見也故示之以見見非見示謂拈示第一見字指純真之性即妙覺明性也如清淨月第二見字指雜妄之精即眼根映用之精也如第二月上來八番顯見皆以見精之見分與塵境之相分對辨意顯見分非是相分歷然可知尚未徹底道破今忽拈出第一見字是自證分證自證分之本體尚非見精之見分可及何況色空之相分哉若悟見相無性全體即是自證隨緣之幻用則上之淨圓淨真心妄為色空而混濫之疑可以冰消瓦解矣合別業同分指見妄之所生且以一人例多人一國例諸國總顯器界根身同一妄耳自淺而深自狹而廣雖多方顯妄而所顯惟真第十以別業同分進退合明而釋微細之餘疑也合者比顯之義別業如一人獨造之業同分是大衆共造之業同別雖二虗妄無殊以別業之妄見易知如一人眼有赤眚見燈光而有圓影此影獨眚目人有不眚者無所以易知圓影不實且如上天不祥之境界統國皆見誰知不實是故同分之妄見難知賴有彼國衆生不見不聞可顯是妄也是須二見比顯故云合也且以下正比顯意謂且用別業易知之一人比例同分難知之多人使難知而成易知再以一國之易知以例諸國之難知使難成易可知擴而充之將諸國之多以例十方之遍總顯內之衆生根身外之國土器界凡諸有漏穢土同是菩提中之妄耳若以至理而論至於三土依正九界同觀一切皆同圓影唯佛界清淨法身寂光真境可稱非圓影矣自淺下結顯前八番見相對辨為淺第九番為深故曰自淺而深一人為狹一國為廣一國為狹諸國為廣故曰自狹而廣意謂上來雖用淺深廣狹多多方法以顯其妄誰知妄無自性全體即真故曰而所顯唯真二廣列四科七大示全妄即真二初標列二正示今初故又舉陰入處界廣及七大融會入於如來藏性此節廣列科大以示全妄即真也故承上起下之辭舉提揚之意謂五陰六入十二處十八界為四科經中就事顯理之文也地水火風空根識為七大經中即相論性之文也夫理事性相原非異法從來不曾分今亦無須合會合也今言四科者事也如來藏者理也七大者相也如來藏者性也事非理外相非性外即事相即理性也衆生久積迷情難以頓遣前來徵心辨見破妄顯真事雖固已徹底道破而猶不知即事相是理性故須廣列四科七大之事相融通會合入於如來藏之理性也二正示使悟物我同根是非一體妄無自性全體即真凡十界依正之相皆循業發現而已此正示全妄即真也物指浮勝二根及六塵之相分我指見聞諸精及諸識之見分以衆生不達見相如幻妄起遍計認為實我實法故曰物我根喻自證之本體今令了達見相如幻全體即是自證故曰使悟同根說是說非俱為不了義教以不了故說見相為妄為非自證為真為是誰知言妄顯真真亦同妄妄既本空真亦不立故曰是非一體妄無自性全體即真也凡十下結顯真妄皆是隨緣之意十界即十法界謂三惡三善三乘及佛依即依報謂同居方便實報寂光正即正報謂十界之根身也循依順也業即事業謂惡善不動無漏亦漏亦無漏非漏非無漏也發謂發起現謂顯現夫絶待妙心離諸名相本來無有世界衆生因性覺必明妄為明覺故無同異中熾然成異此理玄微愚迷難見故皆慕諸佛至真厭衆生至妄今達自證本體不但無衆生并亦無諸佛凡論十界依正之相無非本體隨緣之妙用以隨淨緣則有佛界依正隨染緣則有九界依正染淨皆自心之本體耳言循業發現者謂順惡業則三惡法界依正之相發現順善不動業則三善法界依正之相發現順無漏業則聲聞緣覺依正之相發現順雙亦業則菩薩依正之相發現循雙非業則佛法界依正之相發現也而已者結盡無餘之辭三答執相難性融性相不二二初結起二正融今初既悟即真尚迷循發此結上起下也既字作雖字義乃已而未竟之辭意謂上來全妄即真循業發現兩重奧義領會實難其即真之理雖略見一班奈循發之事尚迷而未悟故曰尚迷循發二正融故又答山河大地之難深窮生起之由譬虗空不拒諸相發揮顯真妙覺明圓照法界一多互應小大相容即體即用非俗非真至於離即離非是即非即則藏心妙性不涉名言矣此答富那執相難性也經中疑問謂七大既是清淨本然云何忽生山河大地山河句指難辭深窮句是釋辭窮謂參究深窮者謂性相不二之義甚深當深心而體究也始生曰生續生曰起由本因也意謂忽生大地之疑毋得明言只消深心窮究生起之本因窮之徹底其理自明譬如下設喻虗空喻如來藏性諸相仍喻七大不拒發揮正喻性不礙相也意謂性即自心之本體相即自心之妙用體用唯是一心性相原非二法故曰虗空不拒諸相發揮也顯真下正示一心真妙覺明即指自心從來不妄曰真永絶言思曰妙三惑不能迷曰覺諸塵不能障曰明自心真明豎窮橫遍故曰圓照法界一無一相多無多相一多隨緣故曰互應大無大相小無小相大小不二故曰相容即體下即以三如來藏結顯一心之義即體句指不空如來藏體指妙心不變之體用指十界隨緣之用體用唯是一心故曰即體即用非俗句指空如來藏俗謂俗諦指六凡法界真謂真諦指四聖法界真俗唯是一心心體一法不立故曰非俗非真至於下二句指空不空如來藏上句即體即用是妙有次句非俗非真是真空今則空有雙遮以顯中道妙心故曰離即離非此正拂迹入玄之的旨而又空有雙照以顯中道妙心故曰是即非即是回途入妙之微言也所以用此二句以顯遮照同時所謂截斷兩頭中間不立離言絶待圓融微妙之靈心也末句結顯離言藏心謂如來藏心妙性謂妙真如性涉謂交涉名是名相言是語言意謂絶待靈心離言說相離心緣相無相亦無如前三藏三重玄義第一重言空一空一切空有中俱空第二重言有一有一切有空中俱有第三重言中一中一切中空有俱中謂之圓融三諦舉一即具三言三即是一非一非三而三而一言語道斷心行處滅故曰不涉名言矣四引迷真逐妄顯妄本無因復引照鏡狂走喻妄無因結責多聞勸修無漏通而言之皆圓理也復再也引是提引此因富那悟妄本空又疑妄因何有故指演若狂走因緣以顯妄本無因也因緣在本經四卷中結責下誡勸責誡勗之辭勸勉進之辭意謂從聞思修入三摩地愈多愈妙如其聞不思修多反亂意經云雖持十二部經如恆河沙祇益戲論人間稱汝多聞第一不能免離登伽之難故云責也又經云不如一日修無漏業遠離憎愛二苦如摩登伽一念熏修無漏善故即證三果故云勸也末二句結節之辭可知顯圓理竟四示圓行二初總標二別釋今初理解雖圓非行莫證解如目行如足有解無行如有目無足雖聞故鄉佳信終無到家之期造修名行契入名證意謂欲見本尊心父務必目足兼資故曰理解雖圓非行莫證二別釋三初明二義決定為修行之要領二定諸根優劣為正修之方便三示雙修顯密為覺路之資糧今初故又明二決定義初審因地發心伏斷無明為修行之要次審煩惱根本意擇圓根為發行之由此節正示行門學者當舉擇法之眼宜簡邪取正為入道之初步也決謂決擇不疑之義定謂一定不易之義義理之所在也因地發心正謂最初下手工夫伏謂調伏不許妄動也斷謂斷除永不復生也無明有二一發業二潤生發業屬第六識如分別取捨等以能發起現行之業用故潤生屬第八識如憎愛投胎領命等以能滋潤種子而受生故俱能覆蔽真性無所明了故曰無明審謂審察言初審者意謂果能圓解大開拈來便是如其解心不朗誠恐舉念即乖此為鈍根者審不為上智察也若是利根之士既能了達萬法唯心煩惱無明全體即是法界一下手時便能圓伏五住煩惱頓空根本無明故為修行之要領也吾輩根鈍迷重務須自量當細心詳察可也此是第一番審察蓋為以因同果乃澄濁入涅槃之良規也次審下示再察煩惱即發業無明謂昏煩之法惱亂心神也根本即潤生無明謂受生根本惑也圓根者圓通之根意指從耳門下手故為發行之由故曰意擇謂原如來之本意欲令選擇耳門圓通為發起行門之由致也囑令再審者意謂事非小可當思之再思為幸蓋為從根解結為脫纏入圓通之妙道也二定諸根優劣為正修之方便於是定六根優劣令一門深入繫鐘驗常綰巾示結陳二十五聖所證法門敕選耳根為最初方便此就根中詳定功用勝劣令擇圓根為入道之門也於是者指上定下之辭優勝也劣卑也六根優劣謂功德全缺因有千二八百之辨也千二為優八百為劣優即圓通劣則否然令一門入者諸令擇優圓之門從此深心直入校之餘門得道之遲速實霄壤矣經云十方如來於十八界一一皆得菩提元無優劣但汝未得圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨擊鐘句佛因阿難自疑六根離塵無體畢竟斷滅以此生滅為因安獲常住之果由是敕令擊鐘證驗聞性真常以明因果俱常決通第一決定義蓋為即動靜寤寐驗明聞性之不斷亦是密指耳根為圓通之門也綰巾句因阿難不會十方諸佛同聲告示生死輪回安樂妙常同是六根更非他物之義意欲別索結解之元故佛綰寶華巾以示結解之方以明結解無二決通第二決定義蓋為離見覺聞知別無結元之可解亦是密示耳門三昧為解結之方也陳二下正示正修方便陳敷列也言行相應曰聖二十五聖始自陳如終至觀音所證法門指修因證果之三昧聖命曰敕揀擇曰選謂二十五位大士各陳所證法門皆為第一方便真實圓通今言敕選者敕是世尊慈命選是文殊揀擇意謂世尊欲令阿難開悟并順此方衆生之機故令文殊選擇耳根一門為初心修行最初方便以入華屋之門蓋謂觀音耳門具三真實堪以教阿難及末劫沈淪也三示雙修顯密為覺路之資糧故又教以攝心軌則安立道場遂聞四重律儀頂光神呪通而言之皆圓行也此緣會衆得聞正修行門各識歸家道路阿難心迹圓明頓悟成佛法門願度末劫衆生重請道場儀範是故世尊又復教以攝心軌則也攝心謂收攝妄心軌則謂儀軌法則安立謂安排設立道場謂修道壇場律是戒律防非止惡之義謂防三毒之非心止七支之惡行也儀是儀範謂具三千之威儀為衆庶之模範也四重指殺盜淫妄根本大戒經中安立道場文在七卷四重律儀文在六卷是因當機請示攝心軌則安立道場佛即示以四重戒相故曰遂聞謂遂便獲聞也是知軌則道場指當機啓請之文故序在四戒之前佛意指在四戒清淨就是攝心軌則故曰因戒生定因定發慧名為三無漏學也頂光神呪即佛頂放光光現化佛佛說心呪以密詮藏心故曰心呪神妙難思故言神呪科言雙修顯密者以行門有正助不同通論般若為正行五度為助行本經第三漸次為正行前二漸次為助行助又有顯有密清淨律儀為顯行壇儀心呪為密行末二句結節可知示圓行竟三明圓證三初總明位次淺深懸示未證而論證二別示行門邪正預談既修宜真修三結歸圓滿菩提尅論到家無新得今初乃至由三增進成就五十五位真菩提路雖談證位未盡行因此答當機懸示聖位之請也乃至超略之辭經中說呪後有護呪文請示文二顛倒因文未麟次序故超略之由因也向上曰增步前曰進言三者一除助因二刳正性三違現業亦名三漸次是能歷之行所謂正助圓彰也成謂善成就謂將就經中始自乾慧終至妙覺共五十七位今言五十五者除前乾慧非真除後妙覺非路自起步入真已後真窮到家已前中間所經由者名菩提路是所歷之立所謂轉依如幻也行為能成就位是所成就先言由後言成就者謂所歷之位自因因趣於果果全因能歷之行方能成就也雖談下正明懸示雖未足之辭談婉言詳說也未不曾也盡圓極也意謂上來雖然詳談層次淺深凡聖行位而真實不曾歷事造修真登果地故科云懸示者此也二別示行門邪正預談既修宜真修二初示邪行歧途二示正修差別今初下而戒業習於七趣情想此示邪行之歧途也先用下字乃超指結名文後而言此段經文是當機借破戒為問端佛廣示七趣差別也戒是謹防義業謂事業有漏之行也此業有三謂一惡二善三不動習是習染煩惱之惑也此習略有二種一情二想七趣謂天仙人修地獄鬼畜愛染曰情即衆生之內分經云因諸愛染發起妄情情積不休能生愛水渴仰曰想即衆生之外分經云因諸渴仰發明虗想想積不休能生勝氣由情想之習而造不動善惡之業此二為因妄招七趣之果以愛水之情下墜故招三惡苦趣之沈果以勝氣之想上升故感三善樂趣之升報以情想參雜故修羅苦樂俱受也蓋此七趣皆是諸有為相妄想發生於妙圓明無作本心皆如空華元無所有知此義者則如來密因常自現前矣是故出世行者當念念隄防謹心覺察故曰戒也二示正修差別防禪定於五陰魔邪無非行門之事此示正修之差別也此段經文世尊用無聞為語端備明五陰魔境也防是時時警覺之意禪是思惟修定是寂靜修言防者心王如使君禪定如城廓設使一念失覺誠恐定城不固使君驚惶故須防之於未然也禪定多種茲不暇贅依本經即指一心三觀為禪定也魔指天魔鬼神邪即邪宗外道魔有二一內魔指自心妄現即色受二陰所現之境二外魔指飛精附人即想陰所現之境邪指行識二陰中所現之境或妄生計度或得少為足蓋因六結欲解正念與妄念交興五陰將開內魔共外魔競起行者宜時時醒覺弗使定水漏泄道岸傾頽也末句結收二科可知三結歸圓滿菩提尅論到家無新得必期於圓滿菩提歸無所得始得名為究竟堅固之證也必是必定謂定須如此期是尅取謂不得不休圓是萬行圓成滿是果地滿證菩提謂無上正等正覺也歸至極之處也言無所得者以妙覺極果即吾人本有因心所謂依妙性開妙解起妙修成妙因歷妙位證妙果今言圓滿不過徹底究竟證此妙性而已古德云未後牢關不離最初一步威音那畔即在今世門頭如達多之頭衣裏之珠本不曾失今何所得故云歸無所得始方才之義言始得者意謂果心如斯方名究竟明圓證竟六結圓名二初結理行證三皆究竟二結教行理三悉楞嚴今初然則依究竟堅固之理立究竟堅固之行修究竟堅固之行證究竟堅固之理楞嚴教旨大抵如是然則二字承上文而直斷之辭理指圓融三諦結顯圓理一科文行即一心三觀結示圓行一科文證是圓空三惑而圓證三德結明圓證一科文全經妙旨以三字結之罄無不盡意謂依理立行修因證果不離現前一念故皆稱究竟堅固也故曰楞嚴一經圓教旨趣大概如是而已大抵猶云大概如是的指無疑之辭二結教行理三悉楞嚴是知教行理三悉號楞嚴了義之說莫此加矣是知二字接上文而有所解悟之辭教指文字般若結全部經文行即觀照般若結經中發明正助顯密諸行理是實相般若結經中所顯如來藏妙真如性觀照般若即空觀文字般若即假觀實相般若即中觀空觀即體真止假觀即方便隨緣止中觀即不止止三止空見思惑三觀空塵沙惑平等止觀空無明惑見思空真諦理顯塵沙空俗諦理顯無明空中諦理顯真諦顯證一切智俗諦顯證道種智中諦顯證一切種智一切智成般若德道種智成解脫德一切種智成法身德般若德即一切事畢竟空解脫德即一切事畢竟假法身德即一切事畢竟中一切事畢竟堅固即梵語首楞嚴故曰教行理三悉號楞嚴吾人現前一念之心念相了不可得即畢竟空是真空了義之說一念之心念性歷歷明明即畢竟假是妙有了義之說一念之心當相了不可得時正性歷歷明明當性歷歷明明時正相了不可得是中道了義之說真空了義非一非三妙有了義而三而一中道了義離即離非是即非即言語道斷心行處滅故曰了義之說莫此加矣結圓名竟第二大科序十軸文義竟三判正宗科節二初正判科二略顯義今初科經者合理行為正宗離正宗為五分一見道二修道三證果四結經五助道科經者謂科判經文之段落也自古判經必大科分三謂一序二正宗三流通藕祖云序如首五官具存正宗如身臟腑無闕流通如手足運行不滯一切諸經皆具斯意所謂初善中善後善今序亦具有之入文第一大科序一經大旨即序分意第二大科序十軸文義即正宗意三四大科即流通意今參序意本經要旨獨重正宗是故十卷經文始終俱為正宗要義序與流通首尾共止三紙並非關要序故置而不提單將正宗一分判其大節概為五科合併而不分也離各開戶牖也謂自初卷阿難見佛至四卷尚留觀聽為顯三諦圓理又自四卷請示屋門之末卷不戀三界是示三觀妙行併二文為一科故曰合理行為正宗也仍將正宗一科分為五家各開戶牖故云離正宗為五分也一見道者見謂圓解頓開猶生盲獲眼道謂三諦道理猶盲大從來不識玄黃朱紫今忽覩見名為見道即第一科顯理之文也二修道者修謂淨除現業道謂無漏三學如履歸家道路險則平之窪則盈之名為修道指四卷請門之七卷護呪文也三證果者證謂智斷究竟果謂妙覺道圓如高居九闕兆庶稱尊名為證果自七卷阿難問位之八卷名為邪觀文也四結經者結示經名也即八卷中文殊問名如來答示止八行文也五助道者助謂示之岐途差別道謂教以自度度人即自八卷說是語已至終卷正宗文盡也二略顯義二初示當分二示跨節今初謂見道而後修道修道而後證果此常途之序固爾謂進解之辭常途一往之談也見有真見似見隨文體會曰似見此是意識分別比量而知也從緣薦得曰真見此是心眼豁開現量證知也心眼有三一慧眼豁開見真諦理二法眼豁開見俗諦理三佛眼豁開見中諦理也修亦二一緣修謂未見道已前一切善行皆是也二真修既見道後無論逆順粗妙一切行門皆是也證亦二一分證二滿證藏通破見思為分證破思盡為滿證別教破無明為分證破十二品盡為滿證圓教當以六即論證一如云衆生皆是佛名理證圓覺經云一切衆生皆證圓覺是也二大開圓解是名字證三圓修止觀名觀行證四六根清淨名相似證五五住豁破名隨分證六窮無明源名圓滿證此是一往之論法爾如然也固爾者本來如斯也二示跨節究論上根修證如發明藏性之後謂不歷僧祇獲法身請入華屋之前謂疑惑消除心悟實相之類又豈局於常哉跨節謂頓悟頓證不得與中下人同日而語也究論尅實之談也上根根器上利也修證修因證果也僧祇謂三大阿僧祇此云無數劫權教大士獲證法身定須經歷阿僧祇劫如唯識論云地前歷一僧祇初地至七地滿二僧祇八地至等覺是三僧祇方獲究竟法身圓頓大士誠為不然頓教謂一念不生即如如佛如慧可大師覓心了不可得大鑒禪師本來無一物便襲祖位即其人也圓教謂發心究竟二不別如本經法會大衆圓悟如來藏性之後當機即陳不歷僧祇獲法身疑惑消除心悟實相之類即其人也豈是反顯之辭局是劃地自限哉是自得之意謂頓教人頓悟頓得圓教人圓修圓證豈可與方便教人務必見而修修而證劃地自限者同日而語哉此等悟證若不以六即論之圓義如何消釋阿難迹示藏教證同初果以當教論之豈非登初發心住位耶判正宗科節竟四示藉教明心大哉教乎夫欲發真歸元明心見性者於此宜盡心焉首句極讚之辭全經妙旨一言讚盡今將經題略示梗概謂大是大法身佛是大般若頂是大解脫如來是大果密因是大因修證是大莊嚴了是大智義是大境菩薩是大人萬行是大業首楞嚴是大定經是大教題為一經之總既了總義別義匪遙故曰大哉教乎也夫欲下甚勸之辭夫發端之辭欲希須之義發真謂開發一真法界歸元謂復歸寂滅元明明心謂洞明圓心固有見性謂徹見妙性天然於此謂向此圓詮大教宜應當也盡心謂赤體荷擔焉歇語辭也意謂斯經高妙極致非文言句義而能盡述唯有退藏密機虗懷仰讚而已凡後之志學之士苟能惜人身得之不易悟大教值之倍難或即生欲發真歸元者欲明心見性者宜應於此一經盡其心力赤體荷擔坐臥經行澄心體究語默動靜反照提撕其或宿種忽芽大開圓解如初春霹𮦷蟄戶頓開窮子竛竮遇到父舍是名發真歸元如密雲被拂心月圓明迷霧初銷性天皎潔是名明心見性從茲而圓起止觀妙修猶風帆揚於順水圓破法界無明似輕塵揚於順風任運中中流入直至薩婆若海有何艱險紆屈之相果能如是未始非頓悟頓得又何必歷三僧祇方能獲證法身哉然而一切衆生誰無佛種凡有心者皆當作佛菩提子箇箇不無阿羅訶人人有分整心慮趣菩提唯人道而能之人能精誠下切苦切深究安患不得真實受用者其不自信以自肯吾末如之何也已矣世無不知此序之美也而近代宏教諸師各擅所長姑為臨筵了事而已既缺注疏故學者失所準常罔求一是蓋其文雖明顯而出顯為難意實幽玄而通玄不易自非深詣圓極熟默經文者無由措手我卓三法師承佛隴真傳為台崖冢嫡久居講席素淹斯經觀此序關節誠多慮初學階梯未便於是運大悲心出妙手眼其始也編科目以分列句章訓字義以貫穿文脈其次也提宏綱以標其旨趣繇名相而剖入玄微言雖簡矣而處處指歸辭甚明焉而班班可考真乃婆心熱語血筆肝文耳時師宏經海上斯稿初成慎厚為懷祕而不出近侍者潛取鈔録頓使洛陽紙貴爾後時異人殊相延成誤幾或將烏作馬貯粕遺珍矣乃者能明定慶二大德發心就梓盛欲公諸同志商余校正用識一言余惟斯序得斯注能使全經大旨披卷了然凡我同人自宜履恩戴德將心融而神領之當有悟如來藏性者在余固不贅云光緒壬寅春王月雁南受業比丘華山拜跋
